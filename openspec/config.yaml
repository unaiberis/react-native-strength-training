# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: React Native + Expo (greenfield). Node.js v24.13.0, npm 11.6.2.
  Architecture: To be defined. Target: strength training app (TrainingPeaks-style for strength).
  Testing: No test runner installed yet (no package.json). Jest + React Native Testing Library expected after Expo scaffold.
  Style: TypeScript, functional components, Expo Router for navigation.
  Strict TDD: false (not available until test runner is installed).

rules:
  proposal:
    - Include rollback plan for risky changes
    - Reference specific TrainingPeaks features being replicated
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Prefer composition over inheritance
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: "npx jest"
  verify:
    test_command: "npx jest"
    build_command: "npx expo export"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

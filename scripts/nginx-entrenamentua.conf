# EntrenamEntua — Web + Expo Go via un solo Metro (port 8081)
#
# Instalación:
#   sudo cp scripts/nginx-entrenamentua.conf /etc/nginx/sites-enabled/entrenamentua.musikak.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# Requiere: expo-metro.service (8081)

server {
    listen 80;
    server_name entrenamentua.musikak.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name entrenamentua.musikak.com;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/entrenamentua.musikak.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entrenamentua.musikak.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Long timeouts for Expo HMR WebSocket
    client_max_body_size 50m;
    client_body_timeout 3600s;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_connect_timeout 60s;
    proxy_http_version 1.1;

    # ─── APK downloads ────────────────────────────────────────
    location = /apk {
        root /root/react-native-strength-training/android/app/build/outputs/apk/release;
        add_header Content-Disposition 'attachment; filename="strength-training.apk"';
        add_header Content-Type "application/vnd.android.package-archive";
        try_files /app-arm64-v8a-release.apk =404;
    }
    location = /apk/universal {
        root /root/react-native-strength-training/android/app/build/outputs/apk/release;
        add_header Content-Disposition 'attachment; filename="strength-training-universal.apk"';
        add_header Content-Type "application/vnd.android.package-archive";
        try_files /app-universal-release.apk =404;
    }

    # ─── Metro (web + Expo Go, port 8081) ─────────────────────
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
    }
}

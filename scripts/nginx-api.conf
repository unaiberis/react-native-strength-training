# nginx site config — api.entrenamentua.musikak.com
#
# Instalación:
#   sudo cp scripts/nginx-api.conf /etc/nginx/sites-enabled/api.entrenamentua.musikak.com
#   sudo nginx -t
#   sudo systemctl reload nginx

server {
    listen 80;
    server_name api.entrenamentua.musikak.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.entrenamentua.musikak.com;

    # ─── SSL (Let's Encrypt) ────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.entrenamentua.musikak.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.entrenamentua.musikak.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ─── PocketBase (port 8090) ────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Seguridad ─────────────────────────────────────────────────
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
}
